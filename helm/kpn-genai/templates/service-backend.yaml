apiVersion: v1
kind: Service
metadata:
  name: {{ include "kpn-genai.backendService" . }}
  labels:
    app.kubernetes.io/name: {{ include "kpn-genai.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    component: backend
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: {{ include "kpn-genai.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    component: backend
